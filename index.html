<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Demo App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            text-align: center;
            padding: 50px;
        }
        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            color: #38bdf8;
        }
        .status {
            color: #22c55e;
            font-weight: bold;
        }
        .info {
            margin-top: 15px;
            font-size: 14px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀Will Vijay Win TN Election</h1>

    <p class="status">✅ Deployment Successful</p>

    <div class="info">
        <p><strong>Environment:</strong> Production</p>
        <p><strong>Version:</strong> v1.0.0</p>
        <p><strong>Server:</strong> AWS EC2 + Nginx</p>
        <p><strong>CI/CD:</strong> GitHub Actions</p>
        <p><strong>Last Deployed:</strong> <span id="time"></span></p>
    </div>
</div>

<script>
    document.getElementById("time").innerText = new Date().toLocaleString();
</script>

</body>
</html>
