name: Deploy to EC2 (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            set -e

            APP_DIR=/home/ec2-user/app

            echo "Preparing app directory..."
            mkdir -p $APP_DIR
            cd $APP_DIR

            # 🔥 Fix: handle dirty folder case
            if [ -d ".git" ]; then
              echo "Repo exists → updating"
              git fetch origin
              git reset --hard origin/main
            else
              echo "No repo → cleaning directory"
              rm -rf * .[^.]* || true
              git clone https://github.com/thejusr28/my-devops-app.git .
            fi

            echo "Stopping old container..."
            docker stop my-app1 || true
            docker rm my-app1 || true

            echo "Building Docker image..."
            docker build -t my-devops-app .

            echo "Starting new container..."
            docker run -d -p 80:80 --name my-app1 my-devops-app

            echo "Cleaning unused Docker resources..."
            docker system prune -af || true
